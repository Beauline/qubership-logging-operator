---

# Charts release configuration file example
# This file is used to update the version of the helm charts and images in the values.yaml file
# It is used in the helm-charts-release action
# ${release} is replaced with the release version provided in the workflow

charts:
  - name: qubership-logging-operator
    chart_file: charts/qubership-logging-operator/Chart.yaml
    values_file: charts/qubership-logging-operator/templates/_images.tpl
    image:
      - ghcr.io/${owner}/qubership-logging-operator:${tag}
      - ghcr.io/${owner}/qubership-logging-integration-tests:${tag}
